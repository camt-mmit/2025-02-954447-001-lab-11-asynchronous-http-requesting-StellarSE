<link
  href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap"
  rel="stylesheet"
/>
@if (data().length > 0) {
  <ul class="_data-list">
    @for (item of data(); track item) {
      <li>
        <a [routerLink]="item.url | extractId">{{ item.name }}</a>
      </li>
    }
  </ul>
} @else {
  <p class="_empty-message">Not Found!!</p>
}
